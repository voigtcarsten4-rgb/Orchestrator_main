# ─── Data Paths ───────────────────────────────────────────────────────────────

data_paths:
  inbox: "/data/inbox/"
  raw: "/data/raw/"
  extracted: "/data/extracted/"
  mapped: "/data/mapped/"
  normalized: "/data/normalized/"
  drafts: "/data/drafts/"
  exports: "/data/exports/"
  reports: "/data/reports/"
  reference: "/data/reference/"
  briefings: "/assets/briefings/"
  handoffs: "/automation/handoffs/"

# ─── Safety Limits ────────────────────────────────────────────────────────────

safety_limits:
  max_pages_per_extraction: 200
  max_emails_per_batch: 100
  max_files_per_hygiene_analysis: 500
  briefing_carryover_days: 7
  approval_overdue_threshold_hours: 48
  workflow_blocked_alert_threshold_hours: 24

# ─── Confidence Thresholds ────────────────────────────────────────────────────

confidence_thresholds:
  minimum_for_auto_proceed: 0.9
  below_this_escalate: 0.6
  description: >
    If agent confidence in an output falls below 0.6, it must escalate to human.
    Auto-proceed to next workflow step requires >= 0.9 confidence on all items.


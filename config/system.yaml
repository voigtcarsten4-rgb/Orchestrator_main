# System Configuration
# Core system settings, operating parameters, and safety limits.
# Managed by: Human Operator
# Last updated: 2026-04-21

version: "1.0"

# ─── System Identity ─────────────────────────────────────────────────────────

system:
  name: "Orchestrator_main"
  description: "AI-assisted business operating system — orchestration-first"
  version: "1.0"
  status: "active"
  repository: "voigtcarsten4-rgb/Orchestrator_main"
  initialized: "2026-04-21"

# ─── Operating Mode ──────────────────────────────────────────────────────────

operating_mode:
  primary: "draft-first"
  description: "All outputs are drafts until explicitly approved by human operator"
  auto_execute: false
  live_integrations_enabled: false
  destructive_actions_permitted: false


name: Apps Script - Pull from Google

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to commit the pulled code to'
        required: true
        default: 'claude/debug-apps-script-wZ6bm'
      open_pr:
        description: 'Open a PR back to main (yes/no)'
        required: false
        default: 'yes'
  schedule:
    # Daily safety pull so the repo doesn't drift if someone edits in the
    # Apps Script editor directly. 03:17 UTC = off-peak.
    - cron: '17 3 * * *'

concurrency:
  group: apps-script-pull
  cancel-in-progress: true

jobs:
  pull:
    name: Pull Apps Script into the repo
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@2.4.2

      - name: Validate required secret
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::Missing repo secret CLASPRC_JSON. See apps-script/README.md for the one-time setup."
            exit 1
          fi

      - name: Write clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"

      - name: Determine target branch
        id: branch
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          if [ -z "$BRANCH" ]; then BRANCH="claude/debug-apps-script-wZ6bm"; fi
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout target branch
        run: |
          git fetch origin "${{ steps.branch.outputs.name }}" || true
          git checkout -B "${{ steps.branch.outputs.name }}" "origin/${{ steps.branch.outputs.name }}" 2>/dev/null \
            || git checkout -B "${{ steps.branch.outputs.name }}"

      - name: Pull latest code from Apps Script
        working-directory: apps-script
        run: clasp pull

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push (if changes)
        id: commit
        run: |
          git add apps-script/
          if git diff --cached --quiet; then
            echo "No changes pulled from Apps Script."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(apps-script): sync from Google Apps Script ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push origin "${{ steps.branch.outputs.name }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR back to main
        if: ${{ steps.commit.outputs.changed == 'true' && github.event.inputs.open_pr != 'no' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view "${{ steps.branch.outputs.name }}" >/dev/null 2>&1; then
            echo "PR already exists for ${{ steps.branch.outputs.name }}; skipping create."
          else
            gh pr create \
              --base main \
              --head "${{ steps.branch.outputs.name }}" \
              --title "Sync from Apps Script editor" \
              --body "Automated pull from the Apps Script project. Review and merge if changes look correct." \
              --draft
          fi

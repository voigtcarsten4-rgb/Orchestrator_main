<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Signature — Private</title>
</head>
<body>
  <!--
    PRIVATE EMAIL SIGNATURE
    Usage: Copy the content of the <table> element below into your
    Outlook signature editor (HTML mode) for your private account.
    Personalise the placeholder fields marked with [BRACKETS].
    Do not commit personalised versions to this repository.
  -->

  <table
    cellpadding="0"
    cellspacing="0"
    border="0"
    style="
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: #2c2c2c;
      max-width: 380px;
      line-height: 1.5;
    "
  >
    <!-- Divider line -->
    <tr>
      <td style="
        padding-bottom: 10px;
        border-top: 1px solid #cccccc;
        font-size: 1px;
        line-height: 1px;
      ">&nbsp;</td>
    </tr>

    <!-- Name row -->
    <tr>
      <td>
        <span style="
          font-size: 14px;
          font-weight: 600;
          color: #2c2c2c;
        ">[First Name] [Last Name]</span>
      </td>
    </tr>

    <!-- Phone row (optional) -->
    <tr>
      <td style="
        font-size: 12px;
        color: #666666;
        padding-top: 4px;
      ">
        <a href="tel:[PHONE_NUMBER]"
           style="color: #666666; text-decoration: none;">
          [Phone Number]
        </a>
      </td>
    </tr>

  </table>
</body>
</html>
